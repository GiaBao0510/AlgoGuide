<!DOCTYPE html>
<html lang="vi" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="AlgoGuide - Học thuật toán qua mô phỏng trực quan tương tác. Sorting, Searching, Graph, Tree, và nhiều hơn nữa.">
  <title>AlgoGuide — Mô phỏng Thuật toán Trực quan</title>
  <link rel="stylesheet" href="styles/themes.css">
  <link rel="stylesheet" href="styles/main.css">
</head>
<body>
  <!-- Mobile Header -->
  <header class="mobile-header" id="mobileHeader">
    <button class="menu-btn" id="menuBtn" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <h1 class="mobile-logo">AlgoGuide</h1>
    <button class="theme-toggle-mobile" id="themeToggleMobile" aria-label="Toggle theme">
      <span class="theme-icon">🌙</span>
    </button>
  </header>

  <!-- Sidebar Overlay (mobile) -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 40 40" fill="none">
            <rect width="40" height="40" rx="10" fill="var(--primary)"/>
            <path d="M10 28L15 14L20 22L25 10L30 28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="logo-text">AlgoGuide</span>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <span class="theme-icon">🌙</span>
      </button>
    </div>

    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Tìm thuật toán..." autocomplete="off">
      <svg class="search-icon" viewBox="0 0 20 20" fill="currentColor">
        <path fill-rule="evenodd" d="M8 4a4 4 0 100 8 4 4 0 000-8zM2 8a6 6 0 1110.89 3.476l4.817 4.817a1 1 0 01-1.414 1.414l-4.816-4.816A6 6 0 012 8z"/>
      </svg>
    </div>

    <nav class="sidebar-nav" id="sidebarNav">
      <!-- Populated by JS -->
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content" id="mainContent">
    <!-- Welcome Screen -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-hero">
        <div class="welcome-icon">
          <svg viewBox="0 0 120 120" fill="none">
            <circle cx="60" cy="60" r="55" stroke="var(--primary)" stroke-width="3" opacity="0.2"/>
            <circle cx="60" cy="60" r="40" stroke="var(--primary)" stroke-width="2.5" opacity="0.4"/>
            <path d="M30 85L45 45L60 70L75 30L90 85" stroke="var(--primary)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="45" cy="45" r="4" fill="var(--primary)"/>
            <circle cx="60" cy="70" r="4" fill="var(--primary)"/>
            <circle cx="75" cy="30" r="4" fill="var(--primary)"/>
          </svg>
        </div>
        <h1>Chào mừng đến với <span class="gradient-text">AlgoGuide</span></h1>
        <p class="welcome-desc">Khám phá, mô phỏng và hiểu sâu các thuật toán lập trình phổ biến thông qua trực quan hóa tương tác.</p>
        <div class="welcome-stats">
          <div class="stat-card">
            <span class="stat-number" id="totalAlgorithms">0</span>
            <span class="stat-label">Thuật toán</span>
          </div>
          <div class="stat-card">
            <span class="stat-number">10</span>
            <span class="stat-label">Nhóm</span>
          </div>
          <div class="stat-card">
            <span class="stat-number">3</span>
            <span class="stat-label">Ngôn ngữ</span>
          </div>
        </div>
        <p class="welcome-hint">👈 Chọn một thuật toán từ sidebar để bắt đầu</p>
      </div>
    </div>

    <!-- Algorithm View -->
    <div class="algorithm-view" id="algorithmView" style="display:none;">
      <div class="algo-header">
        <div class="algo-title-area">
          <span class="algo-category-badge" id="algoCategoryBadge"></span>
          <h2 class="algo-title" id="algoTitle"></h2>
        </div>
      </div>

      <!-- Tabs -->
      <div class="tabs" id="tabs">
        <button class="tab active" data-tab="description">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
          Mô tả
        </button>
        <button class="tab" data-tab="visualizer">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
          Mô phỏng
        </button>
        <button class="tab" data-tab="code">
          <svg viewBox="0 0 20 20" fill="currentColor" width="16" height="16"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"/></svg>
          Code
        </button>
      </div>

      <!-- Tab Content -->
      <div class="tab-content" id="tabContent">
        <!-- Description Tab -->
        <div class="tab-pane active" id="descriptionPane">
          <div class="description-content" id="descriptionContent"></div>
        </div>

        <!-- Visualizer Tab -->
        <div class="tab-pane" id="visualizerPane" style="display:none;">
          <div class="visualizer-controls">
            <div class="controls-row">
              <div class="input-group">
                <label for="algoInput">Dữ liệu đầu vào:</label>
                <input type="text" id="algoInput" placeholder="VD: 5, 3, 8, 1, 9">
                <button class="btn btn-sm" id="randomBtn" title="Tạo ngẫu nhiên">🎲</button>
              </div>
            </div>
            <div class="controls-row">
              <div class="playback-controls">
                <button class="btn btn-icon" id="resetBtn" title="Reset"><svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path fill-rule="evenodd" d="M4 2a1 1 0 011 1v2.101a7.002 7.002 0 0111.601 2.566 1 1 0 11-1.885.666A5.002 5.002 0 005.999 7H9a1 1 0 010 2H4a1 1 0 01-1-1V3a1 1 0 011-1zm.008 9.057a1 1 0 011.276.61A5.002 5.002 0 0014.001 13H11a1 1 0 110-2h5a1 1 0 011 1v5a1 1 0 11-2 0v-2.101a7.002 7.002 0 01-11.601-2.566 1 1 0 01.61-1.276z"/></svg></button>
                <button class="btn btn-icon" id="prevBtn" title="Bước trước"><svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M8.445 14.832A1 1 0 0010 14v-2.798l5.445 3.63A1 1 0 0017 14V6a1 1 0 00-1.555-.832L10 8.798V6a1 1 0 00-1.555-.832l-6 4a1 1 0 000 1.664l6 4z"/></svg></button>
                <button class="btn btn-primary btn-icon" id="playBtn" title="Play"><svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM9.555 7.168A1 1 0 008 8v4a1 1 0 001.555.832l3-2a1 1 0 000-1.664l-3-2z"/></svg></button>
                <button class="btn btn-icon" id="nextBtn" title="Bước sau"><svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18"><path d="M11.555 5.168A1 1 0 0010 6v2.798l-5.445-3.63A1 1 0 003 6v8a1 1 0 001.555.832L10 11.202V14a1 1 0 001.555.832l6-4a1 1 0 000-1.664l-6-4z"/></svg></button>
              </div>
              <div class="speed-control">
                <label>Tốc độ:</label>
                <input type="range" id="speedSlider" min="1" max="10" value="5">
                <span id="speedLabel">5x</span>
              </div>
            </div>
          </div>
          <div class="visualizer-area" id="visualizerArea">
            <div class="visualizer-canvas" id="visualizerCanvas"></div>
          </div>
          <div class="step-info" id="stepInfo">
            <span class="step-counter" id="stepCounter">Bước 0/0</span>
            <p class="step-description" id="stepDescription">Nhấn Play để bắt đầu mô phỏng</p>
          </div>
        </div>

        <!-- Code Tab -->
        <div class="tab-pane" id="codePane" style="display:none;">
          <div class="code-tabs">
            <button class="code-tab active" data-lang="javascript">JavaScript</button>
            <button class="code-tab" data-lang="go">Go</button>
            <button class="code-tab" data-lang="csharp">C#</button>
            <button class="btn btn-sm copy-btn" id="copyBtn" title="Copy to Clipboard">
              📋 Copy
            </button>
          </div>
          <div class="code-content">
            <pre><code id="codeBlock" class="language-javascript"></code></pre>
          </div>
        </div>
      </div>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="bottom-nav" id="bottomNav">
    <button class="bottom-nav-item active" data-tab="description">
      <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M4 4a2 2 0 012-2h4.586A2 2 0 0112 2.586L15.414 6A2 2 0 0116 7.414V16a2 2 0 01-2 2H6a2 2 0 01-2-2V4z"/></svg>
      <span>Mô tả</span>
    </button>
    <button class="bottom-nav-item" data-tab="visualizer">
      <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
      <span>Mô phỏng</span>
    </button>
    <button class="bottom-nav-item" data-tab="code">
      <svg viewBox="0 0 20 20" fill="currentColor" width="20" height="20"><path fill-rule="evenodd" d="M12.316 3.051a1 1 0 01.633 1.265l-4 12a1 1 0 11-1.898-.632l4-12a1 1 0 011.265-.633zM5.707 6.293a1 1 0 010 1.414L3.414 10l2.293 2.293a1 1 0 11-1.414 1.414l-3-3a1 1 0 010-1.414l3-3a1 1 0 011.414 0zm8.586 0a1 1 0 011.414 0l3 3a1 1 0 010 1.414l-3 3a1 1 0 11-1.414-1.414L16.586 10l-2.293-2.293a1 1 0 010-1.414z"/></svg>
      <span>Code</span>
    </button>
  </nav>

  <script src="js/router.js"></script>
  <script src="js/algorithms/sorting.js"></script>
  <script src="js/algorithms/searching.js"></script>
  <script src="js/algorithms/graph.js"></script>
  <script src="js/algorithms/tree.js"></script>
  <script src="js/algorithms/two-pointers.js"></script>
  <script src="js/algorithms/divide-conquer.js"></script>
  <script src="js/algorithms/hashing.js"></script>
  <script src="js/algorithms/greedy.js"></script>
  <script src="js/algorithms/backtracking.js"></script>
  <script src="js/algorithms/math.js"></script>
  <script src="js/main.js"></script>
</body>
</html>
